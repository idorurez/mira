<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Mira - Live2D Test</title>
    <style>
        * { margin: 0; padding: 0; }
        body {
            background: #111;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }
        canvas { display: block; }
        #status {
            position: fixed;
            top: 10px;
            left: 10px;
            color: #0f0;
            font-family: monospace;
            font-size: 14px;
            z-index: 100;
            background: rgba(0,0,0,0.7);
            padding: 8px 12px;
            border-radius: 4px;
        }
        #status.error { color: #f44; }
        #status.warn { color: #fa0; }
        #controls {
            position: fixed;
            bottom: 10px;
            left: 10px;
            z-index: 100;
            background: rgba(0,0,0,0.7);
            padding: 10px;
            border-radius: 4px;
            color: #fff;
            font-family: monospace;
            font-size: 12px;
        }
        #controls button {
            background: #333;
            color: #fff;
            border: 1px solid #555;
            padding: 4px 8px;
            margin: 2px;
            cursor: pointer;
            border-radius: 3px;
            font-family: monospace;
        }
        #controls button:hover { background: #555; }
        #fps {
            position: fixed;
            top: 10px;
            right: 10px;
            color: #0f0;
            font-family: monospace;
            font-size: 14px;
            z-index: 100;
            background: rgba(0,0,0,0.7);
            padding: 8px 12px;
            border-radius: 4px;
        }
    </style>
</head>
<body>

<div id="status">Loading...</div>
<div id="fps">FPS: --</div>

<div id="controls" style="display:none">
    <div><b>Expression Test</b> (or press 1-9)</div>
    <div>
        <button onclick="setExpression('neutral')">Neutral</button>
        <button onclick="setExpression('happy')">Happy</button>
        <button onclick="setExpression('sad')">Sad</button>
        <button onclick="setExpression('surprised')">Surprised</button>
        <button onclick="setExpression('angry')">Angry</button>
    </div>
    <div style="margin-top:8px"><b>Parameters</b></div>
    <div>
        Mouth: <input type="range" id="mouthSlider" min="0" max="100" value="0"
               oninput="setMouth(this.value/100)">
        <span id="mouthVal">0</span>
    </div>
    <div>
        Eye X: <input type="range" id="eyeXSlider" min="-100" max="100" value="0"
               oninput="setEyeX(this.value/100)">
        Eye Y: <input type="range" id="eyeYSlider" min="-100" max="100" value="0"
               oninput="setEyeY(this.value/100)">
    </div>
    <div style="margin-top:4px; color:#888">
        Press 'd' to toggle controls | Move mouse for eye tracking
    </div>
</div>

<!-- PixiJS -->
<script src="https://cdn.jsdelivr.net/npm/pixi.js@6.5.10/dist/browser/pixi.min.js"></script>

<!-- Live2D Cubism Core (Cubism 4) -->
<script src="https://cubism.live2d.com/sdk-web/cubismcore/live2dcubismcore.min.js"></script>

<!-- pixi-live2d-display -->
<script src="https://cdn.jsdelivr.net/npm/pixi-live2d-display@0.4.0/dist/cubism4.min.js"></script>

<script>
const status = document.getElementById('status');
const fpsEl = document.getElementById('fps');
const controls = document.getElementById('controls');

// FPS counter
let frameCount = 0;
let lastFpsTime = performance.now();
function updateFps() {
    frameCount++;
    const now = performance.now();
    if (now - lastFpsTime >= 1000) {
        fpsEl.textContent = `FPS: ${frameCount}`;
        frameCount = 0;
        lastFpsTime = now;
    }
}

// Check for Live2D core
if (typeof Live2DCubismCore === 'undefined') {
    status.textContent = 'ERROR: Live2D Cubism Core not loaded';
    status.className = 'error';
    throw new Error('Cubism Core not loaded');
}

// Create PixiJS app
const app = new PIXI.Application({
    view: document.createElement('canvas'),
    autoStart: true,
    resizeTo: window,
    backgroundColor: 0x111111,
    antialias: true,
});
document.body.appendChild(app.view);

// State
let model = null;
let wsConnected = false;

// Model path - change this to test different models
// Download a sample model and place in ui/live2d_sample/
const MODEL_PATH = 'live2d_sample/Hiyori.model3.json';

async function loadModel() {
    status.textContent = 'Loading Live2D model...';

    try {
        model = await PIXI.live2d.Live2DModel.from(MODEL_PATH, {
            autoInteract: false,  // we control parameters manually
        });

        // Scale and position
        const scale = Math.min(
            window.innerWidth / model.width,
            window.innerHeight / model.height
        ) * 0.8;
        model.scale.set(scale);
        model.x = window.innerWidth / 2;
        model.y = window.innerHeight / 2;
        model.anchor.set(0.5, 0.5);

        app.stage.addChild(model);

        status.textContent = 'Model loaded! Press d for controls.';
        status.className = '';
        controls.style.display = 'block';

        // FPS monitoring
        app.ticker.add(() => updateFps());

        // Try WebSocket connection to face server
        connectWebSocket();

        console.log('Model loaded successfully');
        console.log('Available expressions:', model.internalModel.motionManager);

    } catch (e) {
        status.textContent = `ERROR: ${e.message}`;
        status.className = 'error';
        console.error('Failed to load model:', e);

        if (e.message.includes('404') || e.message.includes('fetch')) {
            status.textContent = 'Model not found. See console for setup instructions.';
            console.log(`
=== LIVE2D TEST SETUP ===

1. Download a free sample model from:
   https://www.live2d.com/en/sdk/download/web/
   (Download "Cubism SDK for Web" and look in Samples/Resources/)

   Or use Hiyori Free model:
   https://cdn.jsdelivr.net/gh/nicx519y/nicx519y.github.io/demo/live2d/Resources/Hiyori/

2. Place the model files in:
   ui/live2d_sample/

3. The folder should contain:
   - *.model3.json (manifest)
   - *.moc3 (model binary)
   - *.png (textures)
   - *.physics3.json (optional)
   - *.exp3.json (expressions, optional)

4. Update MODEL_PATH in this file if the .model3.json filename differs.

5. Reload this page.
`);
        }
    }
}

// === PARAMETER CONTROL ===

function setParam(id, value) {
    if (!model) return;
    const cm = model.internalModel.coreModel;
    cm.setParameterValueById(id, value);
}

function setMouth(value) {
    document.getElementById('mouthVal').textContent = value.toFixed(2);
    setParam('ParamMouthOpenY', value);
}

function setEyeX(value) {
    setParam('ParamEyeBallX', value);
}

function setEyeY(value) {
    setParam('ParamEyeBallY', value);
}

function setExpression(name) {
    if (!model) return;
    // Map expression names to parameter bundles
    const cm = model.internalModel.coreModel;
    const expressions = {
        neutral: () => {
            setParam('ParamEyeLOpen', 1.0);
            setParam('ParamEyeROpen', 1.0);
            setParam('ParamMouthForm', 0);
            setParam('ParamBrowLY', 0);
            setParam('ParamBrowRY', 0);
        },
        happy: () => {
            setParam('ParamEyeLSmile', 1.0);
            setParam('ParamEyeRSmile', 1.0);
            setParam('ParamMouthForm', 1.0);
        },
        sad: () => {
            setParam('ParamBrowLY', -0.5);
            setParam('ParamBrowRY', -0.5);
            setParam('ParamMouthForm', -0.5);
            setParam('ParamEyeLOpen', 0.7);
            setParam('ParamEyeROpen', 0.7);
        },
        surprised: () => {
            setParam('ParamEyeLOpen', 1.3);
            setParam('ParamEyeROpen', 1.3);
            setParam('ParamBrowLY', 1.0);
            setParam('ParamBrowRY', 1.0);
            setParam('ParamMouthOpenY', 0.5);
        },
        angry: () => {
            setParam('ParamBrowLY', -1.0);
            setParam('ParamBrowRY', -1.0);
            setParam('ParamBrowLAngle', -0.5);
            setParam('ParamBrowRAngle', -0.5);
            setParam('ParamMouthForm', -0.7);
        },
    };
    if (expressions[name]) expressions[name]();
}

// === MOUSE EYE TRACKING ===

document.addEventListener('mousemove', (e) => {
    if (!model) return;
    const x = (e.clientX / window.innerWidth) * 2 - 1;  // -1 to 1
    const y = (e.clientY / window.innerHeight) * 2 - 1;
    setParam('ParamEyeBallX', x * 0.8);
    setParam('ParamEyeBallY', -y * 0.5);
    // Slight head turn following eyes
    setParam('ParamAngleX', x * 15);
    setParam('ParamAngleY', -y * 10);
});

// === KEYBOARD CONTROLS ===

document.addEventListener('keydown', (e) => {
    switch(e.key) {
        case 'd': controls.style.display = controls.style.display === 'none' ? 'block' : 'none'; break;
        case '1': setExpression('neutral'); break;
        case '2': setExpression('happy'); break;
        case '3': setExpression('sad'); break;
        case '4': setExpression('surprised'); break;
        case '5': setExpression('angry'); break;
    }
});

// === WEBSOCKET CONNECTION TO FACE SERVER ===

function connectWebSocket() {
    const wsUrl = `ws://${window.location.hostname}:18793`;
    status.textContent += ' | Connecting to face server...';

    try {
        const ws = new WebSocket(wsUrl);

        ws.onopen = () => {
            wsConnected = true;
            status.textContent = 'Connected to face server';
            status.className = '';
        };

        ws.onmessage = (event) => {
            try {
                const state = JSON.parse(event.data);
                applyFaceState(state);
            } catch (e) {
                console.warn('Bad message:', e);
            }
        };

        ws.onclose = () => {
            wsConnected = false;
            status.textContent = 'Face server disconnected (standalone mode)';
            status.className = 'warn';
            // Retry in 5s
            setTimeout(connectWebSocket, 5000);
        };

        ws.onerror = () => {
            status.textContent = 'No face server (standalone mode - use controls)';
            status.className = 'warn';
        };
    } catch (e) {
        status.textContent = 'Standalone mode (no face server)';
        status.className = 'warn';
    }
}

function applyFaceState(state) {
    if (!model) return;

    // Map FaceState from Python to Live2D parameters
    if (state.mouthOpen !== undefined) {
        setParam('ParamMouthOpenY', state.mouthOpen);
    }
    if (state.eyeTargetX !== undefined) {
        setParam('ParamEyeBallX', state.eyeTargetX * 0.8);
        setParam('ParamAngleX', state.eyeTargetX * 15);
    }
    if (state.eyeTargetY !== undefined) {
        setParam('ParamEyeBallY', state.eyeTargetY * 0.5);
        setParam('ParamAngleY', state.eyeTargetY * 10);
    }
    if (state.expression) {
        setExpression(state.expression);
    }
    if (state.isSpeaking) {
        // Simulate talking with mouth movement
        const t = performance.now() / 150;
        setParam('ParamMouthOpenY', 0.3 + Math.sin(t) * 0.3);
    }
}

// === WINDOW RESIZE ===

window.addEventListener('resize', () => {
    if (!model) return;
    const scale = Math.min(
        window.innerWidth / model.width * model.scale.x,
        window.innerHeight / model.height * model.scale.y
    );
    model.x = window.innerWidth / 2;
    model.y = window.innerHeight / 2;
});

// === START ===

loadModel();
</script>

</body>
</html>
